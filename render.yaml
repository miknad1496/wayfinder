services:
  - type: web
    name: wayfinder
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && git checkout -- backend/data/scraped/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_MODEL_ENGINE
        value: claude-opus-4-6
      - key: CLAUDE_MODEL_HAIKU
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLM_ENABLED
        value: "true"
      - key: SLM_ENDPOINT
        value: https://api.runpod.ai/v2/us5mh5vyv6egt3/runsync
      - key: SLM_API_KEY
        sync: false
      - key: SLM_MODEL_NAME
        value: bigherokim/wayfinder-05e
      - key: SLM_MAX_TOKENS
        value: "1024"
      - key: SLM_TEMPERATURE
        value: "0.7"

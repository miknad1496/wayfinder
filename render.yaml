services:
  - type: web
    name: wayfinder
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && git checkout -- backend/data/scraped/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false

<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium metallic body — polished steel -->
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4dce6" />
      <stop offset="30%" stop-color="#a8b5c4" />
      <stop offset="50%" stop-color="#8494a7" />
      <stop offset="70%" stop-color="#a0aebf" />
      <stop offset="100%" stop-color="#6b7d91" />
    </linearGradient>

    <!-- Outer bezel — darker brushed metal -->
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a6a7a" />
      <stop offset="25%" stop-color="#8294a6" />
      <stop offset="50%" stop-color="#4a5a6a" />
      <stop offset="75%" stop-color="#7a8c9e" />
      <stop offset="100%" stop-color="#3a4a5a" />
    </linearGradient>

    <!-- Blue accent — brand blue gradient -->
    <linearGradient id="blueNeedle" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Specular highlight — top-left shine -->
    <radialGradient id="shine" cx="30%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- Edge highlight for bezel -->
    <radialGradient id="edgeShine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- Center hub metallic -->
    <radialGradient id="hubMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c8d4e0" />
      <stop offset="50%" stop-color="#8494a7" />
      <stop offset="100%" stop-color="#5a6a7a" />
    </radialGradient>

    <!-- Ambient shadow -->
    <radialGradient id="ambientShadow" cx="50%" cy="55%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15" />
    </radialGradient>

    <!-- Dial face — slightly lighter than body -->
    <radialGradient id="dialFace" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#e8edf3" />
      <stop offset="100%" stop-color="#b8c4d0" />
    </radialGradient>
  </defs>

  <!-- Drop shadow under compass -->
  <circle cx="20" cy="21" r="18" fill="#000" opacity="0.08" />

  <!-- Outer bezel ring -->
  <circle cx="20" cy="20" r="18" fill="url(#bezel)" />
  <circle cx="20" cy="20" r="18" fill="url(#edgeShine)" />

  <!-- Bezel edge highlight -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="#b0bec5" stroke-width="0.4" opacity="0.6" />
  <circle cx="20" cy="20" r="17.2" fill="none" stroke="#3a4a5a" stroke-width="0.3" opacity="0.5" />

  <!-- Inner dial face -->
  <circle cx="20" cy="20" r="15.5" fill="url(#dialFace)" />

  <!-- Subtle inner ring groove -->
  <circle cx="20" cy="20" r="15.5" fill="none" stroke="#7a8a9a" stroke-width="0.35" opacity="0.4" />

  <!-- Tick marks at cardinal points -->
  <line x1="20" y1="5.5" x2="20" y2="7.5" stroke="#4a5a6a" stroke-width="1" stroke-linecap="round" opacity="0.7" />
  <line x1="20" y1="32.5" x2="20" y2="34.5" stroke="#4a5a6a" stroke-width="0.7" stroke-linecap="round" opacity="0.5" />
  <line x1="5.5" y1="20" x2="7.5" y2="20" stroke="#4a5a6a" stroke-width="0.7" stroke-linecap="round" opacity="0.5" />
  <line x1="32.5" y1="20" x2="34.5" y2="20" stroke="#4a5a6a" stroke-width="0.7" stroke-linecap="round" opacity="0.5" />

  <!-- Minor tick marks -->
  <line x1="29.9" y1="7.8" x2="28.8" y2="9.2" stroke="#7a8a9a" stroke-width="0.4" stroke-linecap="round" opacity="0.4" />
  <line x1="10.1" y1="7.8" x2="11.2" y2="9.2" stroke="#7a8a9a" stroke-width="0.4" stroke-linecap="round" opacity="0.4" />
  <line x1="29.9" y1="32.2" x2="28.8" y2="30.8" stroke="#7a8a9a" stroke-width="0.4" stroke-linecap="round" opacity="0.4" />
  <line x1="10.1" y1="32.2" x2="11.2" y2="30.8" stroke="#7a8a9a" stroke-width="0.4" stroke-linecap="round" opacity="0.4" />

  <!-- North needle — brand blue, elongated diamond -->
  <path d="M 20 7.5 L 21.8 18 L 20 17 L 18.2 18 Z" fill="url(#blueNeedle)" />
  <!-- North needle edge highlight -->
  <path d="M 20 7.5 L 21.8 18 L 20 17 Z" fill="#ffffff" opacity="0.15" />

  <!-- South needle — dark steel -->
  <path d="M 20 32.5 L 21.8 22 L 20 23 L 18.2 22 Z" fill="#4a5a6a" opacity="0.65" />

  <!-- East/West accent lines -->
  <line x1="32" y1="20" x2="23" y2="20" stroke="url(#blueNeedle)" stroke-width="1.2" opacity="0.5" stroke-linecap="round" />
  <line x1="8" y1="20" x2="17" y2="20" stroke="#6b7d91" stroke-width="1.2" opacity="0.4" stroke-linecap="round" />

  <!-- Center hub — polished metal disc -->
  <circle cx="20" cy="20" r="3.5" fill="url(#hubMetal)" />
  <circle cx="20" cy="20" r="3.5" fill="none" stroke="#5a6a7a" stroke-width="0.4" />
  <!-- Hub specular -->
  <circle cx="19" cy="19" r="1.5" fill="#ffffff" opacity="0.35" />

  <!-- Center dot -->
  <circle cx="20" cy="20" r="1" fill="#2563eb" opacity="0.7" />

  <!-- Ambient shadow overlay for depth -->
  <circle cx="20" cy="20" r="18" fill="url(#ambientShadow)" />

  <!-- Top specular shine — the key to "sleek metallic" look -->
  <circle cx="20" cy="20" r="18" fill="url(#shine)" />

  <!-- Outer chrome ring -->
  <circle cx="20" cy="20" r="18.5" fill="none" stroke="#9aa8b8" stroke-width="0.3" opacity="0.5" />
</svg>

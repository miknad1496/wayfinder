<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic gradient -->
    <linearGradient id="metallicGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6EDF3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9D1D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B949E;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30363D;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#30363D;stop-opacity:0.05" />
    </linearGradient>

    <!-- Blue accent -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82D6;stop-opacity:1" />
    </linearGradient>

    <!-- Highlight -->
    <radialGradient id="highlight" cx="35%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="16" cy="16" r="14.5" fill="url(#metallicGradient)" />

  <!-- Shadow overlay -->
  <circle cx="16" cy="16" r="14.5" fill="url(#shadowGradient)" />

  <!-- Highlight -->
  <circle cx="16" cy="16" r="14.5" fill="url(#highlight)" />

  <!-- Inner definition ring -->
  <circle cx="16" cy="16" r="13.2" fill="none" stroke="#30363D" stroke-width="0.4" opacity="0.4" />

  <!-- North needle (blue) -->
  <path d="M 16 6 L 17.5 12 L 16 11.8 L 14.5 12 Z" fill="url(#blueAccent)" />

  <!-- South weight (dark) -->
  <path d="M 16 26 L 17.5 20 L 16 20.2 L 14.5 20 Z" fill="#30363D" opacity="0.6" />

  <!-- East line (accent) -->
  <line x1="26" y1="16" x2="20.5" y2="16" stroke="url(#blueAccent)" stroke-width="1.2" opacity="0.7" stroke-linecap="round" />

  <!-- West line -->
  <line x1="6" y1="16" x2="11.5" y2="16" stroke="#8B949E" stroke-width="1.2" opacity="0.5" stroke-linecap="round" />

  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="url(#metallicGradient)" />

  <!-- Hub shadow -->
  <circle cx="16" cy="16" r="3" fill="url(#shadowGradient)" />

  <!-- Hub highlight -->
  <circle cx="16" cy="16" r="3" fill="url(#highlight)" opacity="0.7" />

  <!-- Center cross marker -->
  <line x1="16" y1="15.3" x2="16" y2="16.7" stroke="#58A6FF" stroke-width="0.6" opacity="0.5" stroke-linecap="round" />
  <line x1="15.3" y1="16" x2="16.7" y2="16" stroke="#58A6FF" stroke-width="0.6" opacity="0.5" stroke-linecap="round" />

  <!-- Outer accent ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#58A6FF" stroke-width="0.6" opacity="0.25" />
</svg>
